<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Unleashed — User guide</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="stylesheet" href="{{ asset('css/help.css') }}">
</head>
<body>
    <div class="help-wrap">
        <header class="help-bar">
            <a class="help-home" href="/">&larr; F1 Unleashed</a>
            <span class="help-title">User guide</span>
        </header>
        <nav class="help-nav">
            {% for key, label, active in nav %}
            <a class="help-nav-link{% if active %} active{% endif %}" href="/help/{{ key }}">{{ label }}</a>
            {% endfor %}
        </nav>
        <article class="help-content">{{ content | safe }}</article>
    </div>
</body>
</html>
