<header class="header">
    <div class="session-info">
        <span class="session-title" id="sessionTitle">Loading...</span>
        <span class="session-badge" id="sessionBadge">--</span>
    </div>

    <div class="track-status white" id="trackStatus">
        <span id="trackStatusText">--</span>
    </div>

    <div class="clocks">
        <div class="clock">
            <div class="clock-label">Local Time</div>
            <div class="clock-value" id="trackTime">--:--:--</div>
        </div>
        <div class="clock">
            <div class="clock-label">Session Time</div>
            <div class="clock-value remaining" id="sessionClock">--:--:--</div>
        </div>
    </div>

    <div class="sync-controls" id="syncControls">
        <!-- Video sync: screen-share the (muted) TV, OCR its session clock and
             compare to the data clock. See video_sync.js (3-video-sync). -->
        <button class="btn btn-video-sync" id="videoSyncBtn" onclick="toggleVideoSync()" title="Sync to TV picture (screen share)">
            <span class="video-sync-light" id="videoSyncLight"></span>
            <span class="video-sync-label">Video sync</span>
        </button>
    </div>

    <div class="audio-controls" id="audioControls">
        <!-- Traffic-light: green = audio playing in sync; yellow =
             seeking / buffering / wanted-but-not-playing; red = audio
             unavailable for the current data-clock target. -->
        <span class="audio-status-light" id="audioStatusLight" title="Audio status"></span>

        <button class="btn btn-mute" id="muteBtn" onclick="toggleMute()" title="Mute (M)">
            <svg class="icon-unmuted" viewBox="0 0 24 24" width="18" height="18" fill="currentColor" stroke="none">
                <path d="M3 9v6h4l5 5V4L7 9H3z"/>
                <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
            </svg>
            <svg class="icon-muted" viewBox="0 0 24 24" width="18" height="18" fill="currentColor" stroke="none">
                <path d="M3 9v6h4l5 5V4L7 9H3z"/>
                <path d="M16.5 12L19 9.5l1.4 1.4L17.9 13.4l2.5 2.5-1.4 1.4L16.5 14.8l-2.5 2.5-1.4-1.4 2.5-2.5-2.5-2.5 1.4-1.4L16.5 12z"/>
            </svg>
        </button>

        <!-- Volume slider — 0..100 → audio.volume 0..1. Persists to
             localStorage. Independent of the mute button. -->
        <input type="range" class="volume-slider" id="volumeSlider"
               min="0" max="100" value="80"
               oninput="handleVolumeChange(this.value)" title="Volume">

    </div>

    <div class="controls">
        <button class="btn btn-play" id="playPauseBtn" onclick="togglePlayPause()" title="Play/Pause data (Space)">
            <span id="playIcon">&#9658;</span>
        </button>
        <button class="btn btn-speed" id="speedBtn">1x</button>
        <button class="btn btn-go-live hidden" id="goLiveBtn" onclick="seekLive()" title="Snap to live edge">LIVE</button>
        <div class="scrubber" id="scrubber">
            <div class="scrubber-line"></div>
            <div class="scrubber-events" id="scrubberEvents"></div>
            <div class="scrubber-dot" id="scrubberDot"></div>
            <div class="scrubber-tooltip" id="scrubberTooltip">--:--:--</div>
        </div>
    </div>

    <button class="btn open-settings" title="Settings" aria-label="Settings">
        <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.488.488 0 00-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 00-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
    </button>
    <button class="btn btn-close" id="closeBtn" title="Close" onclick="if (window.history.length > 1) { window.history.back(); } else { window.location.href = '/'; }">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
</header>
