<div class="tile {{ width }}">
    <div class="rc-tabs" id="rcTabs">
        <button class="tile-btn active" data-tab="rcm">Race control</button>
        <button class="tile-btn" data-tab="radio">Team radio</button>
        <button class="tile-btn" data-tab="pecking">Pecking order</button>
        <button class="tile-btn" data-tab="champ">Championship</button>
    </div>
    <div class="tile-content">
        <div class="race-control-list rc-pane active" id="rcPaneRcm" data-pane="rcm"></div>
        <div class="race-control-list rc-pane" id="rcPaneRadio" data-pane="radio">
            <div class="rc-empty">No team radio yet.</div>
        </div>
        <div class="race-control-list rc-pane" id="rcPanePecking" data-pane="pecking">
            <div class="rc-empty">Loading…</div>
        </div>
        <div class="rc-pane rc-champ-pane" id="rcPaneChamp" data-pane="champ">
            <div class="rc-empty">Championship standings appear once the race starts.</div>
        </div>
    </div>
</div>
