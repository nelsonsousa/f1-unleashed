<div class="tile {{ width | default('w-50') }}" id="telemetryTile">
    <div class="tile-header telemetry-header">
        <!-- View toggle: the trace chart (Telemetry) vs the live gauge dashboard -->
        <div class="telemetry-view-toggle" id="telemetryViewToggle">
            <button class="tile-btn active" data-view="dashboard">Dashboard</button>
            <button class="tile-btn" data-view="telemetry">Telemetry</button>
        </div>
        <!-- Auto-select toggle — dashboard view only (card wfMzaSwh) -->
        <button class="dash-autobtn dashboard-only" id="dashAutoToggle">Auto-select</button>
        <!-- Qualifying lap-part toggle (Q1/Q2/Q3 or SQ1-3) — JS-populated, hidden outside quali (cards 66/83) -->
        <div class="telemetry-part-tabs hidden telemetry-only" id="telemetryPartTabs"></div>
        <div class="telemetry-channels telemetry-only" id="telemetryChannels">
            <button class="telemetry-channel active" data-channel="speed">SPD</button>
            <button class="telemetry-channel" data-channel="rpm">RPM</button>
            <button class="telemetry-channel" data-channel="gear">GEAR</button>
            <button class="telemetry-channel" data-channel="throttleBrake">THR/BRK</button>
        </div>
        <div class="telemetry-modes telemetry-only" id="telemetryModes">
            <button class="telemetry-mode active" data-mode="live">Live</button>
            <button class="telemetry-mode" data-mode="last">Last</button>
            <button class="telemetry-mode" data-mode="best">Best</button>
            <button class="telemetry-mode" data-mode="selection">Selection</button>
        </div>
    </div>
    <div class="tile-content">
        <div class="telemetry-container" id="telemetryContainer">
            <div class="telemetry-side" id="telemetryDriverSelector"></div>
            <div class="telemetry-main">
                <div class="telemetry-charts" id="telemetryCharts">
                    <div class="telemetry-chart" id="telemetryChartWrapper">
                        <canvas id="telemetryCanvas"></canvas>
                        {# Position-data warning — just above the x-axis (telemetry.js). #}
                        <div class="pos-warning" id="telePosWarning" hidden>
                            <svg class="pos-warning-icon" viewBox="0 0 24 24" aria-hidden="true">
                                <path class="pos-warning-tri" d="M12 3 L22.5 21 L1.5 21 Z"/>
                                <rect class="pos-warning-excl" x="11" y="9" width="2" height="6" rx="1"/>
                                <circle class="pos-warning-excl" cx="12" cy="18" r="1.2"/>
                            </svg>
                            <span class="pos-warning-msg" id="telePosWarningMsg"></span>
                        </div>
                    </div>
                </div>
                <div class="telemetry-x-axis" id="telemetryXAxis"></div>
                <div class="telemetry-legend" id="telemetryLegend"></div>
            </div>
        </div>
        <!-- Live gauge dashboard: top driver selector + 2 driver gauges (middle reserved
             for the zoomed track map, card 277) — JS-populated -->
        <div class="dashboard-container" id="dashboardContainer"></div>
    </div>
</div>
