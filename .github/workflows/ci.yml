name: CI

# Template pipeline shape (lint -> unit -> integration -> build). Unit tests run
# the project's real suites; lint/integration/build are placeholders until wired
# up (workflow phase 3 for a fresh clone; F1 already has real unit tests below).

on:
  push:
    branches: [main, test, dev]
  pull_request:
    branches: [main, test, dev]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint
        run: echo "TODO: wire up linter/formatter"

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
      - name: Python unit tests
        run: python -m unittest discover -s tests -p "test_*.py" -v
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Frontend unit tests
        run: node --test tests/*.mjs

  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - name: Integration tests
        run: echo "TODO: run integration test suite (tests/integration)"

  build:
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: echo "TODO: build/package"
