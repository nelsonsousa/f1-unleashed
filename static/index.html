<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Unleashed</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="stylesheet" href="/static/css/home.css?v=2026-06-25a">
    <link rel="stylesheet" href="/static/css/settings.css?v=2026-06-25b">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <div class="header-title">
                    <h1>F1 Unleashed</h1>
                    <p class="subtitle">Formula 1 Live Timing &amp; Replay</p>
                </div>
                <div class="auth-section" id="authSection">
                    <div class="auth-status" id="authStatus">
                        <span class="auth-indicator not-logged-in"></span>
                        <span class="auth-text">Checking...</span>
                    </div>
                    <button class="btn-login" id="loginBtn" onclick="handleLogin()">Login</button>
                </div>
            </div>
        </header>

        <section class="countdown-section" id="countdownSection">
            <div class="countdown-header">
                <h2 id="nextEventName">Loading...</h2>
                <p id="nextSessionName" class="session-name"></p>
            </div>
            <div class="countdown-timer" id="countdownTimer">
                <div class="time-unit">
                    <span class="time-value" id="days">--</span>
                    <span class="time-label">Days</span>
                </div>
                <div class="time-unit">
                    <span class="time-value" id="hours">--</span>
                    <span class="time-label">Hours</span>
                </div>
                <div class="time-unit">
                    <span class="time-value" id="minutes">--</span>
                    <span class="time-label">Minutes</span>
                </div>
                <div class="time-unit">
                    <span class="time-value" id="seconds">--</span>
                    <span class="time-label">Seconds</span>
                </div>
            </div>
            <div class="live-indicator hidden" id="liveIndicator">
                <span class="live-badge">LIVE</span>
                <p class="live-message" id="liveMessage"></p>
                <div class="live-buttons">
                    <a href="#" class="btn-live" id="btnLive">Watch Live</a>
                    <a href="#" class="btn-from-start" id="btnFromStart">From Start</a>
                </div>
            </div>
            <p class="countdown-date" id="countdownDate"></p>
        </section>

        <!-- Two-column layout: schedule grid on the left, cache panel on right. -->
        <div class="home-body">
            <main class="schedule-pane">
                <div class="schedule-header">
                    <div class="season-title">
                        <span class="season-select-wrap">
                            <select class="year-select" id="yearSelect"></select>
                        </span>
                        <span class="season-word">SEASON</span>
                    </div>
                </div>
                <div class="schedule-grid" id="scheduleGrid">
                    <div class="loading">Loading…</div>
                </div>
            </main>

            <aside class="storage-panel">
                <h3>Cached Sessions</h3>
                <p class="cache-info">Timing and audio data cached locally</p>
                <div class="storage-stats">
                    <div class="stat">
                        <span class="label">Sessions</span>
                        <span class="value" id="cachedCount">-</span>
                    </div>
                    <div class="stat">
                        <span class="label">Size</span>
                        <span class="value" id="cachedSize">-</span>
                    </div>
                </div>
                <div class="cached-list" id="cachedList"></div>
                <div class="storage-actions">
                    <button class="btn-secondary" onclick="refreshCache()">Refresh</button>
                    <button class="btn-secondary" onclick="openCacheFolder()">Open folder</button>
                </div>
            </aside>
        </div>

        <footer class="page-footer">
            <a href="/docs">API docs</a>
            &nbsp;·&nbsp;
            <span>F1 Unleashed <span id="appVersion"></span></span>
            <a id="updateAvailable" class="update-available hidden" href="#" target="_blank" rel="noopener"></a>
            <button class="open-settings footer-settings" title="Settings" aria-label="Settings"><svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.488.488 0 00-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 00-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg></button>
        </footer>
    </div>

    <!-- Login Modal -->
    <div class="modal" id="loginModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Login to Formula 1</h3>
                <button class="close-btn" onclick="closeLoginModal()">&times;</button>
            </div>
            <div class="modal-body" id="loginModalBody">
                <!-- Content populated by JS -->
            </div>
        </div>
    </div>

    <script src="/static/js/home.js?v=2026-06-15a"></script>
    <script src="/static/js/settings.js?v=2026-06-25b"></script>
</body>
</html>
