<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Sideways stylised F1 car: orange body, black tyres, transparent background. Nose left. -->
  <g transform="translate(4,-16)">
    <!-- Front wing (far left, near ground) -->
    <rect x="6" y="346" width="128" height="24" rx="6" fill="#FF6A00"/>

    <!-- Rear wing (far right): wide top plane on a vertical support -->
    <rect x="436" y="188" width="64" height="22" rx="5" fill="#FF6A00"/>
    <rect x="462" y="196" width="26" height="150" rx="5" fill="#FF6A00"/>

    <!-- Body: pointed nose -> deck -> cockpit/halo hump -> airbox -> engine cover -> tail -->
    <path d="M12 342
             L110 318
             L202 302
             C216 300 222 300 230 300
             C240 232 302 228 324 302
             L446 312
             L482 326
             L482 360
             L12 360 Z" fill="#FF6A00"/>

    <!-- Cockpit opening (subtle) -->
    <path d="M238 298 C246 266 288 264 302 298 Z" fill="#141414" opacity="0.5"/>

    <!-- Tyres (black) over the body -->
    <circle cx="150" cy="322" r="72" fill="#141414"/>
    <circle cx="374" cy="322" r="72" fill="#141414"/>
    <circle cx="150" cy="322" r="16" fill="#2b2b2b"/>
    <circle cx="374" cy="322" r="16" fill="#2b2b2b"/>
  </g>
</svg>
