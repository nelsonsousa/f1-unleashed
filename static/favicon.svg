<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Detailed side-on F1 car, nose right. Orange body, black tyres, transparent background. -->
  <g transform="translate(0,-30)">

    <!-- Rear wing (far left): endplate + top plane + number panel -->
    <rect x="38" y="238" width="22" height="122" rx="4" fill="#F26A21"/>
    <rect x="30" y="236" width="64" height="20" rx="4" fill="#F26A21"/>
    <rect x="40" y="280" width="20" height="30" rx="3" fill="#ffffff"/>
    <rect x="47" y="285" width="6" height="20" rx="1" fill="#F26A21"/>

    <!-- Body shadow (darker orange underside) -->
    <path d="M60 372 L490 372 L490 340 C474 352 300 356 236 356 L96 352 L66 340 Z" fill="#C9531A"/>

    <!-- Main body: engine cover -> airbox -> cockpit -> nose -->
    <path d="M60 358
             L66 300
             L98 296
             C142 292 170 258 198 238
             L216 230
             L238 262
             L300 258
             C324 256 342 262 362 286
             L452 326
             C476 334 492 344 492 356
             L492 360
             L60 360 Z" fill="#F26A21"/>

    <!-- Sidepod intake (dark slot) -->
    <path d="M300 300 L360 300 L372 322 L306 322 Z" fill="#7a3210"/>

    <!-- Front wing (far right) -->
    <rect x="430" y="350" width="64" height="16" rx="4" fill="#F26A21"/>
    <rect x="486" y="336" width="12" height="34" rx="3" fill="#F26A21"/>

    <!-- Wheels: tyre + spoked rim + hub -->
    <g transform="translate(152,341)">
      <circle r="37" fill="#141414"/>
      <circle r="24" fill="#9aa0a8"/>
      <g stroke="#5a5f66" stroke-width="4" stroke-linecap="round">
        <line x1="-22" y1="0" x2="22" y2="0"/>
        <line x1="-22" y1="0" x2="22" y2="0" transform="rotate(60)"/>
        <line x1="-22" y1="0" x2="22" y2="0" transform="rotate(120)"/>
      </g>
      <circle r="24" fill="none" stroke="#6b7178" stroke-width="2"/>
      <circle r="8" fill="#3a3a3a"/>
    </g>
    <g transform="translate(374,341)">
      <circle r="37" fill="#141414"/>
      <circle r="24" fill="#9aa0a8"/>
      <g stroke="#5a5f66" stroke-width="4" stroke-linecap="round">
        <line x1="-22" y1="0" x2="22" y2="0"/>
        <line x1="-22" y1="0" x2="22" y2="0" transform="rotate(60)"/>
        <line x1="-22" y1="0" x2="22" y2="0" transform="rotate(120)"/>
      </g>
      <circle r="24" fill="none" stroke="#6b7178" stroke-width="2"/>
      <circle r="8" fill="#3a3a3a"/>
    </g>
  </g>
</svg>
