<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Live Timing Archive</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="stylesheet" href="/static/css/browser.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <div class="header-title">
                    <h1><a href="/">F1 Live Timing Archive</a></h1>
                    <p class="subtitle">Browse and replay Formula 1 session data</p>
                </div>
            </div>
        </header>

        <nav class="breadcrumb" id="breadcrumb">
            <span class="crumb active" data-level="years">Years</span>
        </nav>

        <div class="live-banner hidden" id="liveBanner"></div>

        <div class="download-status" id="downloadStatus"></div>

        <main class="browser">
            <!-- Years View -->
            <section class="view active" id="yearsView">
                <div class="grid" id="yearsGrid"></div>
            </section>

            <!-- Meetings View -->
            <section class="view" id="meetingsView">
                <span id="selectedYear" class="hidden"></span>
                <div class="grid" id="meetingsGrid"></div>
            </section>

            <!-- Sessions View -->
            <section class="view" id="sessionsView">
                <span id="selectedMeeting" class="hidden"></span>
                <div class="grid" id="sessionsGrid"></div>
            </section>
        </main>

        <aside class="storage-panel">
            <h3>Cached Sessions</h3>
            <p class="cache-info">Raw timing data cached locally</p>
            <div class="storage-stats">
                <div class="stat">
                    <span class="label">Sessions</span>
                    <span class="value" id="cachedCount">-</span>
                </div>
                <div class="stat">
                    <span class="label">Size</span>
                    <span class="value" id="cachedSize">-</span>
                </div>
            </div>
            <div class="cached-list" id="cachedList"></div>
            <div class="storage-actions">
                <button class="btn-secondary" onclick="refreshCache()">Refresh</button>
            </div>
        </aside>
    </div>

    <div class="modal" id="downloadModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Downloading Session</h3>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalBody">
                <div class="download-progress">
                    <div class="progress-text" id="progressText">Preparing download...</div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <div class="progress-topics" id="progressTopics"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/browser.js"></script>
</body>
</html>
